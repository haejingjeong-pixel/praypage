<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Icon Preview</title>
<style>
body { background: #1a1a2e; color: #fff; font-family: sans-serif; padding: 40px; }
.preview { display: flex; gap: 40px; margin-bottom: 30px; }
.icon-box { text-align: center; }
.icon-box svg { display: block; margin: 0 auto 8px; }
.icon-box .label { font-size: 12px; color: #aaa; }
.menu-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  background: rgba(255,255,255,0.05);
  width: 200px;
  margin-bottom: 8px;
  font-size: 14px;
  color: rgba(255,255,255,0.7);
  cursor: pointer;
}
.menu-item:hover { background: rgba(255,255,255,0.1); color: #fff; }
.menu-item.active {
  color: #facc6b;
  background: rgba(255,255,255,0.16);
  box-shadow: inset 0 0 0 1px rgba(250,204,107,0.95);
}
.menu-item .icon-wrap {
  width: 16px;
  height: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0.78;
}
.menu-item.active .icon-wrap { opacity: 1; }
</style>
</head>
<body>
<h2>SVG Icons Preview</h2>
<div class="preview">
  <div class="icon-box">
    <svg width="64" height="64" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14V7l6-5 6 5v7"/><path d="M6 14v-4h4v4"/></svg>
    <div class="label">mark (house)</div>
  </div>
  <div class="icon-box">
    <svg width="64" height="64" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5l2 2.5 2-2.5"/><path d="M2 11.5c2-1 3-1 5 0s3 1 5 0"/><path d="M2 13c2-1 3-1 5 0s3 1 5 0"/><circle cx="13" cy="8" r=".5" fill="currentColor" stroke="none"/></svg>
    <div class="label">jonah (whale tail + waves)</div>
  </div>
  <div class="icon-box">
    <svg width="64" height="64" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13l4.5-9 2 4"/><path d="M6.5 8l2.5-5 4 10"/><path d="M10 2l-1.5 2.5h2.5l-2 3"/></svg>
    <div class="label">sinal (mountain + lightning)</div>
  </div>
</div>

<h2>Menu Simulation</h2>
<div class="menu-item">
  <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 14V7l6-5 6 5v7"/><path d="M6 14v-4h4v4"/></svg></span>
  <span>마가 다락방</span>
</div>
<div class="menu-item active">
  <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5l2 2.5 2-2.5"/><path d="M2 11.5c2-1 3-1 5 0s3 1 5 0"/><path d="M2 13c2-1 3-1 5 0s3 1 5 0"/><circle cx="13" cy="8" r=".5" fill="currentColor" stroke="none"/></svg></span>
  <span>요나의 고래뱃속</span>
</div>
<div class="menu-item">
  <span class="icon-wrap"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 13l4.5-9 2 4"/><path d="M6.5 8l2.5-5 4 10"/><path d="M10 2l-1.5 2.5h2.5l-2 3"/></svg></span>
  <span>모세의 시내산</span>
</div>
</body>
</html>
