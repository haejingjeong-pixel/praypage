    <script>
      (function () {
        var overlay = document.getElementById("codex-boot-intro");
        var root = document.getElementById("root");
        var startedAt = Date.now();
        var hidden = false;
        var assetsReady = false;
        var renderReady = false;

        var criticalAssets = [
          "assets/back_golbang_new.webp",
          "assets/b_golbang9.webp",
          "assets/new_up_ui.webp",
          "assets/new_pray_ui_off.webp",
          "assets/new_pray_ui_on.webp"
        ];

        function hideOverlay() {
          if (hidden || !overlay) return;
          if (!renderReady || !assetsReady) return;
          hidden = true;
          window.setTimeout(function () {
            overlay.classList.add("codex-boot-intro-hidden");
            window.setTimeout(function () {
              if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 750);
          }, Math.max(0, 650 - (Date.now() - startedAt)));
        }

        function loadImage(src) {
          return new Promise(function (resolve) {
            var image = new Image();
            var done = false;

            function finish() {
              if (done) return;
              done = true;
              resolve();
            }

            image.onload = function () {
              if (image.decode) {
                image.decode().then(finish).catch(finish);
              } else {
                finish();
              }
            };
            image.onerror = finish;
            image.src = src;
            if (image.complete) image.onload();
          });
        }

        function waitForCriticalAssets() {
          var timeout = new Promise(function (resolve) {
            window.setTimeout(resolve, 4200);
          });
          var ready = Promise.all(criticalAssets.map(loadImage));
          Promise.race([ready, timeout]).then(function () {
            assetsReady = true;
            hideOverlay();
          });
        }

        function waitForAppRender() {
          if (root && root.children.length > 0) {
            renderReady = true;
            hideOverlay();
            return;
          }
          window.requestAnimationFrame(waitForAppRender);
        }

        waitForCriticalAssets();
        window.requestAnimationFrame(waitForAppRender);
        window.addEventListener("load", function () {
          window.setTimeout(function () {
            assetsReady = true;
            renderReady = true;
            hideOverlay();
          }, 2400);
        }, { once: true });
      })();
    </script>
