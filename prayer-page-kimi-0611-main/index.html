    <script>
      (function () {
        var exiting = false;

        function ensureExitOverlay() {
          var overlay = document.getElementById("codex-exit-overlay");
          if (overlay) return overlay;
          if (!document.body) return null;
          overlay = document.createElement("div");
          overlay.id = "codex-exit-overlay";
          overlay.setAttribute("aria-hidden", "true");
          document.body.appendChild(overlay);
          return overlay;
        }

        function showExitOverlay() {
          exiting = true;
          document.documentElement.classList.add("codex-exiting");
          var overlay = ensureExitOverlay();
          if (overlay) overlay.style.setProperty("display", "block", "important");
        }

        function hideExitOverlay() {
          if (!exiting) return;
          exiting = false;
          document.documentElement.classList.remove("codex-exiting");
          var overlay = document.getElementById("codex-exit-overlay");
          if (overlay) overlay.style.display = "none";
        }

        window.addEventListener("beforeunload", showExitOverlay, { capture: true });
        window.addEventListener("pagehide", showExitOverlay, { capture: true });
        window.addEventListener("pageshow", function () {
          hideExitOverlay();
        }, { capture: true });
        document.addEventListener("visibilitychange", function () {
          if (document.visibilityState === "hidden") {
            showExitOverlay();
          } else {
            hideExitOverlay();
          }
        }, { capture: true });
      })();
    </script>

    <script>
      (function () {
        var overlay = document.getElementById("codex-boot-intro");
        var root = document.getElementById("root");
        var startedAt = Date.now();
        var hidden = false;

        function hideOverlay() {
          if (hidden || !overlay) return;
          hidden = true;
          window.setTimeout(function () {
            overlay.classList.add("codex-boot-intro-hidden");
            window.setTimeout(function () {
              if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
            }, 750);
          }, Math.max(0, 650 - (Date.now() - startedAt)));
        }

        function waitForAppRender() {
          if (root && root.children.length > 0) {
            hideOverlay();
            return;
          }
          window.requestAnimationFrame(waitForAppRender);
        }

        window.requestAnimationFrame(waitForAppRender);
        window.addEventListener("load", function () {
          window.setTimeout(hideOverlay, 1600);
        }, { once: true });
      })();
    </script>
