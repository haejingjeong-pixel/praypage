<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>기도 통계</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: ui-serif, "Noto Serif KR", Georgia, serif;
        background: #21170f;
        color: #fff4d7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 50% 0%, rgba(255, 218, 140, 0.18), transparent 34rem),
          linear-gradient(180deg, #2d1f14 0%, #17100b 100%);
      }

      main {
        width: min(760px, calc(100vw - 32px));
        margin: 0 auto;
        padding: max(28px, env(safe-area-inset-top, 0px)) 0 40px;
      }

      a {
        color: rgba(255, 244, 215, 0.72);
        text-decoration: none;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0;
        font-size: clamp(24px, 6vw, 38px);
        line-height: 1.2;
        letter-spacing: 0.04em;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 40px;
        height: 40px;
        border: 1px solid rgba(255, 244, 215, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        font-size: 22px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 18px;
      }

      .card,
      .theme-row {
        border: 1px solid rgba(255, 244, 215, 0.16);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
      }

      .card {
        padding: 18px;
      }

      .label {
        display: block;
        color: rgba(255, 244, 215, 0.68);
        font-size: 14px;
        margin-bottom: 10px;
      }

      strong {
        color: #ffd982;
        font-size: clamp(28px, 10vw, 48px);
        line-height: 1;
      }

      h2 {
        margin: 26px 0 12px;
        color: rgba(255, 244, 215, 0.88);
        font-size: 18px;
        line-height: 1.35;
      }

      .theme-list {
        display: grid;
        gap: 9px;
      }

      .theme-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 13px 15px;
      }

      .theme-row span {
        color: rgba(255, 244, 215, 0.75);
      }

      .theme-row b {
        color: #ffd982;
        font-size: 18px;
      }

      .notice {
        margin-top: 14px;
        color: rgba(255, 244, 215, 0.58);
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 520px) {
        main {
          width: min(100vw - 24px, 760px);
        }

        header {
          align-items: flex-start;
        }

        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <a href="index.html">PRAY PAGE</a>
          <h1>기도 통계</h1>
        </div>
        <a class="back-link" href="index.html" aria-label="돌아가기">‹</a>
      </header>

      <section class="summary" aria-label="기도 요약">
        <p class="card"><span class="label">이번 주 전체 기도</span><strong data-weekly-count>0</strong></p>
        <p class="card"><span class="label">오늘 기도</span><strong data-today-count>0</strong></p>
      </section>

      <section>
        <h2>테마별 기도</h2>
        <div class="theme-list" data-theme-stats></div>
        <p class="notice" data-stats-notice>Supabase에서 통계를 불러오는 중입니다.</p>
      </section>
    </main>

    <script src="supabase-prayer-stats.js?v=supabase-weekly-filter-20260629"></script>
  </body>
</html>
